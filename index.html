<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Update</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
    <a href="index.html">Deliveries</a>
    <a href="inventory.html">Inventory</a>
    </nav>

    <h1>Delivery Dashboard</h1>

<div class="card">
  <h3>Update Inventory After Delivery</h3>

  <div class="delivery-controls controls">
    <input type="text" id="itemSearch" placeholder="Search item...">
    <div id="searchResults" class="dropdown"></div>

    <input type="number" id="changeAmount" placeholder="Quantity delivered">
    <input type="text" id="deliveredTo" placeholder="Delivered item to...">
    <input type="date" id="deliveredOn" placeholder="Delivery date">

    <button id="updateBtn">Update Inventory</button>
  </div>
</div>

<div class="card">
  <h3>Recent Deliveries</h3>
  <div id="recentDeliveries"></div>
</div>
  
    <script type="module" src="app.js"></script>
</body>
</html>
