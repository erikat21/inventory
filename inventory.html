<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
    <a href="index.html">Deliveries</a>
    <a href="inventory.html">Inventory</a>
    </nav>

  <h1>Inventory Dashboard</h1>

  <div id="lowStockWarning"></div>

  <div class="card">
    <h3>Add New Item</h3>
    <input type="text" id="newItemName" placeholder="Item name">
    <input type="number" id="newItemQty" placeholder="Starting quantity">
    <input type="number" id="newItemThreshold" placeholder="Low stock threshold">
    <button id="addBtn">Add Item</button>
  </div>
  
  <div class="card">
    <h3>Inventory List</h3>
    <div class="controls">
  <!-- <select id="filterSelect">
    <option value="all">All Items</option>
    <option value="low">Low Stock Only</option>
    <option value="in">In Stock Only</option>
  </select> -->

  <select id="sortSelect">
    <option value="qty-asc">Quantity (Low → High)</option>
    <option value="qty-desc">Quantity (High → Low)</option>
    <option value="name-asc">Name (A → Z)</option>
    <option value="name-desc">Name (Z → A)</option>
  </select>

  <input type="text" id="searchInput" placeholder="Search items...">
</div>
    <div id="inventorySearchResults" class="dropdown"></div>

    <div id="inventoryList"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
